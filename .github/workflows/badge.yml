name: Update version badge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version badge
        run: |
          mkdir -p badges
          VERSION=$(jq -r '.version' package.json)
          VERSION_MSG=$(echo "$VERSION" | sed 's/-/%E2%80%93/g')
          curl -sf "https://img.shields.io/badge/version-v${VERSION_MSG}-blue.svg" -o badges/version.svg

      - name: Commit badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update version badge [skip ci]'
          file_pattern: badges/version.svg
